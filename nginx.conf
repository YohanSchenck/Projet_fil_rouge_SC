events { worker_connections 1024; }

http {
    upstream whisper_backend {
        # Docker fait le round-robin automatiquement entre les réplicas
        server inference-worker:8000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://whisper_backend;
            proxy_read_timeout 900s; # Important pour les longs audios
            proxy_send_timeout 900s;
            proxy_connect_timeout 75s;
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            # Transmission du fichier sans limitation de taille
            client_max_body_size 0; 
        }
    }
}