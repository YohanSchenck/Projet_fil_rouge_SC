services:
  # 1. Les Workers d'inférence (Réplicas de Faster-Whisper)
  inference-worker:
      image: fedirz/faster-whisper-server:latest-cpu
      environment:
        - WHISPER_MODEL=tiny
        - WHISPER_DEVICE=cpu
        - WHISPER_COMPUTE_TYPE=int8 # On force l'int8
        - WHISPER_CPU_THREADS=3
        - WHISPER_WORKERS=2
      deploy:
        replicas: 1 
        resources:
          limits:
            cpus: '6.0'
            memory: 5G
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
        interval: 20s
        timeout: 10s
        retries: 5

  # 2. Ton API FastAPI
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/transcription_db

  # 3. Observabilité
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
  
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_storage:/var/lib/grafana
      - ./grafana/provisioning/datasource:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards/json
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_storage: